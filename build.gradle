plugins {
    id 'java'
    id 'application'
    id 'com.diffplug.spotless' version '6.25.0' // Fügt das Spotless-Plugin hinzu
}

repositories {
    mavenCentral()
}

dependencies {
    // JUnit (Jupiter) als Abhängigkeit für die Tests einbinden
    testImplementation platform('org.junit:junit-bom:5.10.2') // JUnit 5/6 Basis
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

application {
    // Definiert die Hauptklasse, damit das Programm über Gradle startbar ist
    mainClass = 'catcafe.Main'
}

tasks.named('test') {
    // Sagt Gradle, dass es die JUnit-Plattform für Tests nutzen soll
    useJUnitPlatform()
}

spotless {
    java {
        // Konfiguriert den Google-Java-Formatter
        googleJavaFormat().aosp().reflowLongStrings() 
        // .aosp() stellt die Einrückung auf 4 Leerzeichen (statt 2) um
        // .reflowLongStrings() bricht zu lange Strings automatisch um
    }
}